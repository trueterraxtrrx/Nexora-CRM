version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-demo_only_change_me}
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASSWORD: ${DB_PASSWORD:-demo_only_change_me}
      DB_POOL_SIZE: 10
      JWT_SECRET: ${JWT_SECRET:-demo_only_change_me_before_private_deploy}
      JWT_EXPIRY_HOURS: 24
      PORT: 8000
      THREADS: 4
      DEBUG: "false"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:5173"
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_DEMO_MODE: "true"
    depends_on:
      - backend

volumes:
  postgres_data:
# Project version: Nexora CRM V2.5
